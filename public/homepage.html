<!DOCTYPE html>
<html lang="en">
	<head>
		<title>HOMEPAGE for deployments</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
	
		<title>Homepage for deployments</title>
		<link rel="stylesheet" href="/assets/css/style.css">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
		<script type="text/javascript" src="/assets/js/script.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	</head>

	<body onload="generateDropdown()">
		<div class="m-4">
			<nav class="navbar navbar-expand-lg navbar-light bg-light">
				<div class="container-fluid">
					<div class="inner-flex-space-between flex no-flex-1100">
						<div class="logo">
							<a href="/">
								<img src="assets/images/S&W logo.png" height="60">
							</a>
						</div>
					</div>
					<button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
						<span class="navbar-toggler-icon"></span>
					</button>
					<div class="collapse navbar-collapse" id="navbarCollapse">
						<div class="navbar-nav">
							<a href="#" class="nav-item nav-link active" height="60">Genesis UI</a>
							<a href="https://www.youtube.com/user/StarkAndWayne" class="nav-item nav-link active">Help!<img src="assets/images/ytlogo.jpeg" height="60"/></a>
						</div>
						<div class="navbar-nav ms-auto">
						  <form action = "/" method = "GET">
							<input style="width:auto;" type="submit" value="Log Out">
						  <form>
						</div>
					</div>
				</div>
			</nav>
		</div>

		<div id="leftSplit" class="split left">
			<h4> Environments: </h4>
			<h6> Select an environment to see deployments: </h6>
			<div id="deploy" style="left:15%">
				<select id="dropdown" hidden=true onchange="showDeploymentInfo(this.value)"></select>
			</div>
		</div>
		<div id="deployments" class="split right" hidden=true>
			<h4> Deployments</h4>
			<h6> Click on the deployments to see more details: </h6>
			<div id="depButtons"></div>
		</div>

		<div id="deploymentDetails" class="split bottom" hidden=true>
			<h4> Selected deployment's details: </h4>
			<div id="table" class="table" ></table>
		</div>
	</body>
</html>
