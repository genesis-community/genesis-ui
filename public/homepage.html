<!DOCTYPE html>
<html lang="en">
	<head>
		<title>HOMEPAGE for deployments</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
	
		<title>Homepage for deployments</title>
		<link rel="stylesheet" href="/assets/css/style.css">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	</head>

	<body onload="bttn()">
		<div class="m-4">
			<nav class="navbar navbar-expand-lg navbar-light bg-light">
				<div class="container-fluid">
					<div class="inner-flex-space-between flex no-flex-1100">
						<div class="logo">
							<a href="/">
								<img src="assets/images/S&W logo.png" height="60">
							</a>
						</div>
					</div>
					<button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
						<span class="navbar-toggler-icon"></span>
					</button>
					<div class="collapse navbar-collapse" id="navbarCollapse">
						<div class="navbar-nav">
							<a href="#" class="nav-item nav-link active" height="60">Genesis UI</a>
							<a href="https://www.youtube.com/user/StarkAndWayne" class="nav-item nav-link active">Help!<img src="assets/images/ytlogo.jpeg" height="60"/></a>
						</div>
						<div class="navbar-nav ms-auto">
						  <form action = "/" method = "GET">
							<input style="width:auto;" type="submit" value="Log Out">
						  <form>
						</div>
					</div>
				</div>
			</nav>
		</div>

		<div id="leftSplit" class="split left">
			<h4> Environments: </h4>
			<h6> Select an environment to see deployments: </h6>
			<div id="deploy" style="left:15%">
				<select id="dropdown" hidden=true onchange="showDeployments(this.value)"></select>
			</div>
		</div>
		<div id="deployments" class="split right" hidden=true>
			<h4> Deployments</h4>
			<h6> Click on the deployments to see more details: </h6>
			<div id="depButtons"></div>
		</div>

		<div id="deploymentDetails" class="split bottom" hidden=true>
			<h4> Selected deployment's details: </h4>
			<div id="table" class="table" ></table>
		</div>
	</body>
</html>

<script>
	function bttn(){
		const ul = document.getElementById('deploy');
		const url = '/bosh';

		fetch(url)
		.then((resp) => resp.json())
		.then(function(data) {
			console.log(data)
			//return function(data) {
				dep = document.getElementById("dropdown")
				dep.hidden = false
				for(env in data){
					console.log(env)
					let option = document.createElement("option")
					option.innerHTML = env;
					option.value = env;
					dep.options.add(option);
				}
		})
		.catch(function(error) {
			console.log(error);
		});
	}
</script>

<script>
	function showDeployments(env){
		m = document.getElementById("deployments")
		m.hidden = true
		r = document.getElementById("deploymentDetails")
		r.hidden = true
		const url = '/bosh';
		fetch(url)
		.then((resp) => resp.json())
		.then(function(data) {
			//console.log(data[env])
			envDict = data[env] // data[buffalo-lab] dictionary
			depDiv = document.getElementById("depButtons")
			depDiv.innerHTML = ""
			for(kitname of Object.keys(envDict)){ // bosh, vault, etc in buffalo-lab
				console.log(kitname)
				m = document.getElementById("deployments")
				m.hidden = false
				let btn = document.createElement("button");
				//depDiv = document.getElementById("depButtons")
				btn.innerHTML = kitname;
				depDiv.appendChild(btn)
				btn.onclick = function displayTable()
				{ // bosh & vault mapped to Array[Objects] like
					// {bosh_name: "buffalo-lab", deploy_date: "2020-Nov-14 00:56:33 UTC", deployer_name: "xiujiao", kit_name: "bosh", kit_version: "2.0.1"}
					arrDep = envDict[kitname] // array of deployment dict in bosh/vault
					console.log(arrDep)
					r = document.getElementById("deploymentDetails")
					r.hidden = false
					r.innerHTML = ""
					h = document.createElement("h3")
					h.innerHTML = " Selected deployment's details: "
					r.appendChild(h)
					table = document.createElement("table")
					table.innerHTML = ""
					// access first element of array
					if(arrDep != null){
						
						// create table heading!
						let tablerow = document.createElement("tr")
						for(header of Object.keys(arrDep[0]))
						{
							let tableheading = document.createElement("th")
							tableheading.innerHTML = header;
							tableheading.style.font = 10;
							tablerow.append(tableheading)
						}
						table.appendChild(tablerow)

						for(depObject of arrDep){ 
							// accesses each deployment dict object in the bosh/vault array
							console.log(depObject)
							r.appendChild(table);
							details = document.createElement("tr")
							for ([key,value] of Object.entries(depObject)) 
							{
								//console.log(key +"" + value)
								d = document.createElement("td")
								d.innerHTML = (`${value}`);
								details.appendChild(d)
							}
							table.appendChild(details)
						}
					}
				}
			}
		})
		.catch(function(error) {
			console.log(error);
		});
	}
</script>
